name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install toolchain from rust-toolchain.toml
        run: rustup toolchain install
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  rust-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: operator/go.mod
          cache-dependency-path: operator/go.sum
      - run: make -C operator test
      - run: make -C operator lint
      - name: Generated code and formatting are committed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git status --porcelain
            echo "::error::generated code is stale or untracked — run 'make -C operator manifests generate fmt' and commit"
            exit 1
          fi

  proto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1
        with:
          setup_only: true
          version: 1.71.0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: operator/go.mod
          cache-dependency-path: operator/go.sum
      - name: Lint and regenerate
        run: make proto
      - name: Generated code is committed and fresh
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git status --porcelain
            echo "::error::generated code is stale or untracked — run 'make proto' and commit"
            exit 1
          fi
      - name: Breaking-change check against main
        run: |
          if git cat-file -e origin/main:buf.yaml 2>/dev/null; then
            buf breaking --against '.git#branch=origin/main'
          else
            echo "no buf.yaml on main yet; skipping"
          fi
