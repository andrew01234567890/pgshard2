version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
    groups:
      cargo-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: gomod
    directory: /operator
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
    groups:
      go-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: docker
    directory: /operator
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
