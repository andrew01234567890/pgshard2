apiVersion: pgshard.dev/v1alpha1
kind: PgShardRouting
metadata:
  labels:
    app.kubernetes.io/name: pgshard
    app.kubernetes.io/managed-by: kustomize
  name: pgshardrouting-sample
spec:
  epoch: 1
  topologyGeneration: 1
  shards:
    - name: pgshardcluster-sample-min-80
      keyRange:
        end: "80"
      state: serving
    - name: pgshardcluster-sample-80-max
      keyRange:
        start: "80"
      state: serving
