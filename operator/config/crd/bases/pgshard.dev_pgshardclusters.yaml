    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: PgShardCluster is the root object of a sharded PostgreSQL cluster.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              PgShardClusterSpec defines the desired state of PgShardCluster.

              Optional nested structs are pointers, not value types: a value-typed
              struct with omitempty still serializes as {} (Go omits only empty basic
              types), so a GET→Update round-trip would materialize the absent block and
              trigger its defaults, silently mutating the spec.
            properties:
              backup:
                description: BackupSpec wires a cluster to object storage.
                properties:
                  barrier:
                    description: |-
                      BarrierSpec controls cross-shard consistency barriers (the coordinated
                      restore points PITR resolves against).
                    properties:
                      forceWalSwitch:
                        default: true
                        description: Switch WAL after the barrier so it is restorable
                          immediately.
                        type: boolean
                      gateDeadline:
                        default: 2s
                        type: string
                      interval:
                        default: 5m
                        type: string
                      mode:
                        default: gated
                        description: |-
                          gated briefly buffers writes for a cross-shard consistent point;
                          loose skips the gate (documented causal caveat).
                        enum:
                        - gated
                        - loose
                        type: string
                    type: object
                  repo:
                    description: BackupRepoSpec locates the pgBackRest repository.
                    properties:
                      bucket:
                        type: string
                      credentialsSecretRef:
                        description: Secret with repository credentials (provider-specific
                          keys).
                        properties:
                          name:
                            default: ""
                            description: |-
                              Name of the referent.
                              This field is effectively required, but due to backwards compatibility is
                              allowed to be empty. Instances of this type with an empty value here are
                              almost certainly wrong.
                              More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
