                        type: object
                        x-kubernetes-map-type: atomic
                      endpoint:
                        type: string
                      region:
                        type: string
                      type:
                        enum:
                        - s3
                        - gcs
                        - azure
                        type: string
                    required:
                    - bucket
                    - credentialsSecretRef
                    - type
                    type: object
                  retention:
                    description: RetentionSpec bounds repository growth.
                    properties:
                      fullCount:
                        default: 4
                        format: int32
                        minimum: 1
                        type: integer
                      recoveryWindowDays:
                        default: 14
                        format: int32
                        minimum: 1
                        type: integer
                    type: object
                  schedules:
                    description: BackupSchedulesSpec are cron expressions per backup
                      type.
                    properties:
                      differential:
                        type: string
                      full:
                        type: string
                      incremental:
                        type: string
                    type: object
                required:
                - repo
                type: object
              pause:
                description: Pause suspends reconciliation (hibernation).
                type: boolean
              placement:
                description: |-
                  PlacementSpec controls how a cluster's shard databases are laid out onto
                  physical PgShardNodes. Moving along the density/isolation spectrum is an
                  online operation, not a rebuild.
                properties:
                  colocateWith:
                    description: |-
                      ColocateWith names another cluster in the same namespace whose nodes this
                      cluster's shard databases are packed onto (shared mode only): the two
                      databases then share physical instances.
                    type: string
                  mode:
                    default: dedicatedInstance
                    description: |-
                      PlacementMode trades physical density against isolation for a cluster's
                      shard databases.
                    enum:
                    - shared
                    - dedicatedInstance
                    - dedicatedMachine
                    type: string
                type: object
                x-kubernetes-validations:
                - message: colocateWith is only valid with mode 'shared'
                  rule: self.mode == 'shared' || !has(self.colocateWith)
              postgres:
                description: PostgresSpec pins the PostgreSQL version and tuning inputs.
                properties:
                  hashFunction:
                    default: xxhash64_v1
                    description: HashFunction maps shard keys to keyspace ids. Immutable.
                    type: string
                    x-kubernetes-validations:
                    - message: hashFunction is immutable
                      rule: self == oldSelf
                  image:
                    description: Image overrides the default pgshard-postgres image
                      for this version.
                    type: string
                  parameters:
                    additionalProperties:
                      type: string
                    description: |-
                      Parameters are merged over the auto-configuration derived from the
                      size class; restart-classified parameters roll out online.
                    type: object
                  version:
                    description: Major version; pgshard requires PostgreSQL 18 or
                      newer.
                    pattern: ^(1[89]|[2-9][0-9])$
                    type: string
                required:
                - version
                type: object
              router:
                description: RouterSpec sizes the router deployment.
                properties:
                  replicas:
                    default: 2
                    format: int32
                    minimum: 1
                    type: integer
                  resources:
                    description: ResourceRequirements describes the compute resource
                      requirements.
                    properties:
                      claims:
                        description: |-
                          Claims lists the names of resources, defined in spec.resourceClaims,
                          that are used by this container.

                          This field depends on the
                          DynamicResourceAllocation feature gate.

                          This field is immutable. It can only be set for containers.
                        items:
                          description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                          properties:
                            name:
                              description: |-
                                Name must match the name of one entry in pod.spec.resourceClaims of
                                the Pod where this field is used. It makes that resource available
                                inside a container.
                              type: string
                            request:
                              description: |-
                                Request is the name chosen for a request in the referenced claim.
                                If empty, everything from the claim is made available, otherwise
                                only the result of this request.
                              type: string
                          required:
                          - name
                          type: object
                        type: array
                        x-kubernetes-list-map-keys:
                        - name
                        x-kubernetes-list-type: map
                      limits:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Limits describes the maximum amount of compute resources allowed.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                      requests:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Requests describes the minimum amount of compute resources required.
                          If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                          otherwise to an implementation-defined value. Requests cannot exceed Limits.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                    type: object
                  writeLeaseSeconds:
                    default: 10
                    description: |-
                      A router that cannot refresh routing within this lease stops
                      accepting writes (bounds the stale-router window during failover).
                    format: int32
                    maximum: 60
                    minimum: 1
                    type: integer
                type: object
              shards:
                description: |-
                  ShardsSpec fixes the initial shard layout. All later changes go through
                  PgShardReshard.
                properties:
                  initialCount:
                    description: Number of equal-range shards at cluster creation.
                      Immutable.
                    format: int32
                    maximum: 128
                    minimum: 1
                    type: integer
                    x-kubernetes-validations:
                    - message: initialCount is immutable; reshard instead
                      rule: self == oldSelf
                required:
                - initialCount
                type: object
              size:
                description: SizeSpec chooses auto-configuration inputs.
                properties:
                  class:
                    enum:
                    - S
                    - M
                    - L
                    - XL
                    type: string
                  overrides:
                    description: SizeOverrides sets explicit values on top of (or
                      instead of) a size class.
                    properties:
                      replicasPerShard:
                        description: Instances per shard including the primary.
                        format: int32
                        maximum: 9
                        minimum: 1
                        type: integer
                      resources:
                        description: ResourceRequirements describes the compute resource
