                spectrum requires an online move
              rule: has(self.placement) == has(oldSelf.placement) && (!has(self.placement)
                || self.placement == oldSelf.placement)
          status:
            description: PgShardClusterStatus defines the observed state of PgShardCluster.
            properties:
              backup:
                description: ClusterBackupStatus surfaces the latest barrier and backup
                  facts.
                properties:
                  lastBarrierId:
                    type: string
                  lastBarrierTime:
                    format: date-time
                    type: string
                  lastFullBackupTime:
                    format: date-time
                    type: string
                  walArchivingHealthy:
                    type: boolean
                type: object
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              phase:
                enum:
                - Provisioning
                - Ready
                - Degraded
                - Resharding
                - Restoring
                - Paused
                type: string
              restoredFrom:
                description: RestoredFrom records restore provenance on a restored
                  cluster.
                properties:
                  barrierId:
                    type: string
                  repoPath:
                    type: string
                  sourceTopologyGeneration:
                    format: int64
                    type: integer
                type: object
              routers:
                description: RouterCounts aggregates router readiness and epoch acknowledgement.
                properties:
                  minAckedEpoch:
                    format: int64
                    type: integer
                  ready:
                    format: int32
                    type: integer
                type: object
              routingEpoch:
                description: Mirror of the compiled PgShardRouting epoch.
                format: int64
                type: integer
              shards:
                description: |-
                  ShardCounts aggregates shard readiness; per-shard detail lives on
                  PgShardShard so this object stays O(1) regardless of shard count.
                properties:
                  degraded:
                    format: int32
                    type: integer
                  ready:
                    format: int32
                    type: integer
                  total:
                    format: int32
                    type: integer
                type: object
              topologyGeneration:
                description: Bumps only on structural change (shard set or table catalog).
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
