---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: pgshardtableconfigs.pgshard.dev
spec:
  group: pgshard.dev
  names:
    kind: PgShardTableConfig
    listKind: PgShardTableConfigList
    plural: pgshardtableconfigs
    singular: pgshardtableconfig
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.clusterRef
      name: Cluster
      type: string
    - jsonPath: .status.applied
      name: Applied
      type: boolean
    - jsonPath: .status.compiledIntoEpoch
      name: Epoch
      type: integer
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          PgShardTableConfig declares tables and sequences for a cluster (the
          vschema analog; app-team owned).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              PgShardTableConfigSpec declares part of a cluster's sharding schema.
              Multiple PgShardTableConfig objects union together (app teams own their
              tables independently); the routing compiler validates that no table is
              declared twice across the union.
            properties:
              clusterRef:
                type: string
                x-kubernetes-validations:
                - message: clusterRef is immutable
                  rule: self == oldSelf
              sequences:
                items:
                  description: SequenceEntry declares a global sequence hosted on
                    the system shard.
                  properties:
                    blockSize:
                      default: 1000
                      description: Ids handed to a router per block grab.
                      format: int64
                      maximum: 1000000
                      minimum: 1
                      type: integer
                    name:
                      maxLength: 63
                      pattern: ^[A-Za-z_][A-Za-z0-9_$]*$
                      type: string
                  required:
                  - name
                  type: object
                maxItems: 200
                type: array
              tables:
                items:
                  description: |-
                    TableEntry declares one table's sharding configuration. Identifier fields
                    flow into PostgreSQL DDL, so they are constrained at admission to
                    unquoted-identifier syntax (letters/digits/underscore/$, not starting with
                    a digit, ≤63 bytes) to keep untrusted app-team input from injecting DDL.
                  properties:
                    name:
                      maxLength: 63
                      pattern: ^[A-Za-z_][A-Za-z0-9_$]*$
                      type: string
                    schema:
                      default: public
                      maxLength: 63
                      pattern: ^[A-Za-z_][A-Za-z0-9_$]*$
                      type: string
                    sequences:
                      items:
                        description: RoutingSequence binds a column to a global sequence.
                        properties:
                          column:
                            maxLength: 63
                            pattern: ^[A-Za-z_][A-Za-z0-9_$]*$
                            type: string
                          sequence:
                            maxLength: 63
                            pattern: ^[A-Za-z_][A-Za-z0-9_$]*$
                            type: string
                        required:
                        - column
                        - sequence
                        type: object
                      type: array
                    shardKeyColumn:
                      description: |-
                        Column hashed to the keyspace id. Required for sharded tables and
                        must be part of the primary key (enforced by the schema apply flow).
                      maxLength: 63
                      pattern: ^[A-Za-z_][A-Za-z0-9_$]*$
                      type: string
                    type:
                      default: sharded
                      description: TableType classifies a table in the sharding schema.
                      enum:
                      - sharded
                      - global
                      type: string
                  required:
                  - name
                  type: object
                maxItems: 500
                type: array
            required:
            - clusterRef
            type: object
            x-kubernetes-validations:
            - message: sharded tables must declare shardKeyColumn
              rule: '!has(self.tables) || self.tables.all(t, !has(t.type) || t.type
                != ''sharded'' || (has(t.shardKeyColumn) && size(t.shardKeyColumn)
                > 0))'
          status:
            description: PgShardTableConfigStatus reports compilation results.
            properties:
              applied:
                type: boolean
              compiledIntoEpoch:
                description: Routing epoch this config was last compiled into.
                format: int64
                type: integer
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
