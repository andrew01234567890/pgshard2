---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - pgshard.dev
  resources:
  - pgshardclusters
  - pgshardshards
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - pgshard.dev
  resources:
  - pgshardclusters/finalizers
  - pgshardshards/finalizers
  verbs:
  - update
- apiGroups:
  - pgshard.dev
  resources:
  - pgshardclusters/status
  - pgshardshards/status
  verbs:
  - get
  - patch
  - update
