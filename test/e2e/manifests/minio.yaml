# Object storage for e2e runs: pgBackRest repos and backup catalogs land here.
# Static credentials are intentional — this only ever runs inside a throwaway
# KIND cluster.
apiVersion: v1
kind: Namespace
metadata:
  name: pgshard-e2e
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: pgshard-e2e
type: Opaque
stringData:
  MINIO_ROOT_USER: pgshard-e2e
  MINIO_ROOT_PASSWORD: pgshard-e2e-secret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: pgshard-e2e
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: quay.io/minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
          args: ["server", "/data"]
          envFrom:
            - secretRef:
                name: minio-credentials
          ports:
            - containerPort: 9000
              name: s3
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: s3
            initialDelaySeconds: 2
            periodSeconds: 3
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: pgshard-e2e
spec:
  selector:
    app: minio
  ports:
    - name: s3
      port: 9000
      targetPort: s3
